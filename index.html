<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@200..700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/axios@1.13.2/dist/axios.min.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="src/index.css">
    <title>Forecast</title>
</head>
<body>
    <div class="forecast-app">
        <header>
            <form class="search-input" id="search-input">
                <input class="input" id="input" type="search" placeholder="Search for city..." required />
                <input class="search-button" id="search-button" type="submit" value="Search"/>
            </form>
        </header>

        <main>
    <div class="forecast-data">
        <div class="location" id="location"><h1></h1></div>

      
        <div class="location-details">
            <em><span id="time"> </span>, <span id="description"> </span></em><br>
            Humidity: <strong id="humidity"> </strong><br> 
            Wind: <strong id="wind-speed"> </strong>
        </div>

        <div class="location-temp" id="location-temp">
            <div class="temp-icon" id="temp-icon">
                <img src="http://shecodes-assets.s3.amazonaws.com/api/weather/icons/few-clouds-night.png" alt="weather icon">
            </div>
            <span id="temp-value">°F</span>
        </div>
    </div>

    <div class="weather-forecast" id="forecast">

    </div>

</div>
    </div>
</main>

        <footer>
            Coded by <a href="https://github.com/VonjanaeChatt" target="_blank">Vonjanae Chatt</a> is open-sourced on<a href="https://github.com/VonjanaeChatt/forecast" target="_blank"> Github </a>and hosted on 
            <a href="https://vcforecast.netlify.app/" target="_blank">Netlify</a>
        </footer>
    </div>

    <script src="index.js"></script>
</body>
</html>
